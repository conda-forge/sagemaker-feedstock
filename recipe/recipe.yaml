context:
  name: sagemaker
  version: "3.6.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/sagemaker-${{ version }}.tar.gz
  sha256: 7c4d8c66a495dd1183f353de86431d0870cbcf45e19287f48a09ea6f2affca2d

build:
  noarch: python
  script: echo "[sagemaker-feedstock] intentionally not including any files"
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}
    - sagemaker-python-sdk ==${{ version }}

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - sagemaker
        - sagemaker.train

about:
  homepage: https://github.com/aws/sagemaker-python-sdk/
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Open source library for training and deploying models on Amazon SageMaker.
  documentation: https://sagemaker.readthedocs.io/en/stable/
  repository: https://github.com/aws/sagemaker-python-sdk/

extra:
  recipe-maintainers:
    - mollyheamazon
    - jameslamb
    - raybellwaves
